name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Seed sample data
        run: bun run seed
        env:
          MONGOTUI_URI: mongodb://localhost:27017

      - name: Typecheck
        run: bun run typecheck

      - name: Test (unit + live-Mongo + multi-connection e2e)
        run: bun test
        env:
          MONGOTUI_URI: mongodb://localhost:27017
